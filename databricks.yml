# yaml-language-server: $schema=bundle_config_schema.json
bundle:
  name: tsnpdcl_analytics

resources:
  jobs:
    tsnpdcl_pipeline:
      # The Databricks Monthly ETL Pipeline
      # Schedule: Runs on the 2nd of every month at 3:00 AM IST (21:30 UTC on the 1st).
      # This gives AWS Lambda (which fires at 2:00 AM IST on the 1st) a full 1-hour window
      # to finish downloading all monthly CSV files from the Telangana Open Data portal
      # before the Medallion ETL pipeline begins processing.
      name: tsnpdcl-monthly-pipeline

      email_notifications:
        on_success:
          - nileshkumar.patil@zemosolabs.com
        on_failure:
          - nileshkumar.patil@zemosolabs.com

      # Monthly periodic schedule — 2nd of every month at 3:00 AM IST (21:30 UTC on the 1st)
      # Quartz cron: seconds minutes hours day-of-month month day-of-week year
      schedule:
        quartz_cron_expression: "0 30 21 1 * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED

      # Sequential Medallion Workflow
      tasks:
        - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ./etl/bronze.ipynb

        - task_key: silver_incremental_load
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ./etl/silver.ipynb

        - task_key: data_quality_checks
          depends_on:
            - task_key: silver_incremental_load
          notebook_task:
            notebook_path: ./tests/test_data_quality.ipynb

        - task_key: gold_batch_aggregation
          depends_on:
            - task_key: data_quality_checks
          notebook_task:
            notebook_path: ./etl/gold.ipynb

targets:
  dev:
    # Set default target. It will use ~/.databrickscfg for Auth securely
    default: true

  prod:
    # This explicitly maps to the --target prod executed by GitHub Actions
    workspace:
      host: https://dbc-fcb103e0-45c4.cloud.databricks.com # The CI/CD engine securely injects the prod host via ENV Variables
